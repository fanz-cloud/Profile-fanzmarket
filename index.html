<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Admin | MarketFanzz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0c; /* Hitam Pekat */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            background: #16161a;
            width: 350px;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid #2a2a2e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #007bff; /* Biru Aksentuasi */
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
        p.tagline { font-size: 13px; color: #888; margin-bottom: 20px; }

        .stats {
            display: flex;
            justify-content: space-around;
            background: #1f1f23;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .stat-item span { display: block; font-size: 14px; font-weight: 600; }
        .stat-item small { color: #666; font-size: 10px; text-transform: uppercase; }

        .links { display: flex; flex-direction: column; gap: 12px; }

        .link-btn {
            background: #232329;
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .link-btn:hover {
            background: #007bff;
            border-color: #00d2ff;
            transform: translateY(-3px);
        }

        .footer { margin-top: 25px; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="foto_profil.jpg" alt="Admin" class="avatar">
        
        <h1>MarketFanzz</h1>
        <p class="tagline">Mobile Dev & Digital Entrepreneur</p>

        <div class="stats">
            <div class="stat-item">
                <span>99+</span>
                <small>Orders</small>
            </div>
            <div class="stat-item">
                <span>Fast</span>
                <small>Process</small>
            </div>
            <div class="stat-item">
                <span>Safe</span>
                <small>Legal 100%</small>
            </div>
        </div>

        <div class="links">
            <a href="https://fanz-cloud.github.io/upd5-Fanzz-Market/" class="link-btn">🌐 Kunjungi Market</a>
            <a href="https://fanz-cloud.github.io/support-fanz-market/" class="link-btn">Bot Assistant</a>
            <a href="https://fanz-cloud.github.io/dev-profile-fanz/" class="link-btn">Developer profile</a>
        </div>

        <div class="footer">
            &copy; 2026 MarketFanzz Ecosystem
        </div>
    </div>

</body>
</html>
